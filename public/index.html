<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥊</text></svg>">
  <title>punchline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fafafa;
      --text: #111;
      --border: #ccc;
      --muted: #888;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Cutive Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px 96px;
      overflow: hidden;
      position: relative;
    }

    .glove-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .glove {
      position: absolute;
      will-change: transform;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes drift0 {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(60px, -120px) rotate(40deg); }
      50%  { transform: translate(-30px, -250px) rotate(-20deg); }
      75%  { transform: translate(80px, -380px) rotate(60deg); }
      100% { transform: translate(0, -110vh) rotate(90deg); }
    }
    @keyframes drift1 {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(-50px, -100px) rotate(-30deg); }
      50%  { transform: translate(40px, -220px) rotate(25deg); }
      75%  { transform: translate(-70px, -350px) rotate(-50deg); }
      100% { transform: translate(20px, -110vh) rotate(-80deg); }
    }
    @keyframes drift2 {
      0%   { transform: translate(0, 0) rotate(10deg); }
      33%  { transform: translate(70px, -180px) rotate(-35deg); }
      66%  { transform: translate(-40px, -340px) rotate(45deg); }
      100% { transform: translate(10px, -110vh) rotate(-60deg); }
    }
    @keyframes drift3 {
      0%   { transform: translate(0, 0) rotate(-15deg); }
      20%  { transform: translate(-80px, -90px) rotate(20deg); }
      60%  { transform: translate(50px, -280px) rotate(-40deg); }
      100% { transform: translate(-30px, -110vh) rotate(70deg); }
    }

    .container {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 56px;
    }

    h1 {
      font-size: clamp(48px, 10vw, 72px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 8px;
    }

    .form-section {
      margin-bottom: 48px;
    }

    .input-label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      font-family: 'Cutive Mono', monospace;
      font-size: 16px;
      color: var(--text);
      background-color: var(--bg);
      border: 1px solid var(--border);
      padding: 16px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      line-height: 1.5;
      display: block;
    }

    textarea::placeholder {
      opacity: 0.35;
    }

    textarea:focus {
      border-color: var(--text);
    }

    .button-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
    }

    button {
      font-size: 28px;
      line-height: 1;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: scale(1.12);
      border-color: var(--text);
    }

    button:disabled {
      cursor: not-allowed;
    }

    button.spinning {
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    .error-msg {
      font-size: 12px;
      color: #b44;
      letter-spacing: 0.04em;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .result-section {
      display: none;
    }

    .result-section.visible {
      display: block;
    }

    .result-divider {
      height: 1px;
      background-color: var(--border);
      margin-bottom: 32px;
    }

    .joke-text {
      font-size: 20px;
      line-height: 1.7;
      font-weight: 400;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="glove-bg" id="glove-bg"></div>

  <div class="container">
    <header>
      <h1>punchline</h1>
      <p class="subtitle">write a line, get a punch.</p>
    </header>

    <div class="form-section">
      <label class="input-label" for="punchline-input">your punchline</label>
      <textarea
        id="punchline-input"
        placeholder="the punchline goes here..."
        rows="3"
      ></textarea>
      <div class="button-row">
        <button id="generate-btn" type="button">🥊</button>
        <span class="error-msg" id="error-msg"></span>
      </div>
    </div>

    <div class="result-section" id="result-section">
      <div class="result-divider"></div>
      <p class="joke-text" id="joke-text"></p>
    </div>
  </div>

  <script>
    const input = document.getElementById('punchline-input');
    const btn = document.getElementById('generate-btn');
    const errorMsg = document.getElementById('error-msg');
    const resultSection = document.getElementById('result-section');
    const jokeText = document.getElementById('joke-text');
    const gloveBg = document.getElementById('glove-bg');

    const DRIFT_NAMES = ['drift0', 'drift1', 'drift2', 'drift3'];

    function spawnGlove() {
      const el = document.createElement('span');
      el.className = 'glove';
      el.textContent = '🥊';
      const size = 16 + Math.random() * 28;
      el.style.fontSize = size + 'px';
      el.style.opacity = 0.06 + Math.random() * 0.09;
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = (100 + Math.random() * 20) + 'vh';
      const dur = 18 + Math.random() * 24;
      const drift = DRIFT_NAMES[Math.floor(Math.random() * DRIFT_NAMES.length)];
      el.style.animationName = drift;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = '0s';
      gloveBg.appendChild(el);
      setTimeout(() => {
        el.remove();
        spawnGlove();
      }, dur * 1000);
    }

    for (let i = 0; i < 18; i++) {
      setTimeout(() => spawnGlove(), Math.random() * 12000);
    }

    function setError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.toggle('visible', !!msg);
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.classList.toggle('spinning', loading);
    }

    async function generate() {
      const punchline = input.value.trim();
      if (!punchline) {
        setError('write something first.');
        return;
      }

      setError('');
      setLoading(true);
      resultSection.classList.remove('visible');

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ punchline }),
        });

        if (!res.ok) {
          throw new Error(`server error: ${res.status}`);
        }

        const data = await res.json();
        jokeText.textContent = data.joke;
        resultSection.classList.add('visible');
      } catch (err) {
        setError(err.message || 'something went wrong.');
      } finally {
        setLoading(false);
      }
    }

    btn.addEventListener('click', generate);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generate();
      }
    });
  </script>
</body>
</html>
